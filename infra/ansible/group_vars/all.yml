repo_url: https://github.com/charan-sai-ramisetti/tricloud-vault.git
app_dir: /home/ubuntu/tricloud-vault
backend_dir: "{{ app_dir }}/backend"
venv_dir: "{{ backend_dir }}/env"

domain_frontend: tricloudvault.charansai.me
domain_backend: tricloudvault1.charansai.me

# SSM connection
ansible_connection: amazon.aws.aws_ssm
ansible_aws_ssm_region: ap-south-1
ansible_aws_ssm_bucket_name: tricloud-ansible-ssm
ansible_python_interpreter: /usr/bin/python3