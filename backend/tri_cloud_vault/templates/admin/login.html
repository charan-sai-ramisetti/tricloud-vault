{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>TriCloud Vault Admin</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
    background:#eef1f6;
    margin:0;
}

/* top navbar */

.topbar{
    background:white;
    padding:15px 40px;
    border-bottom:1px solid #e5e7eb;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.brand{
    font-size:22px;
    font-weight:600;
}

.nav-links{
    display:flex;
    gap:20px;
}

.nav-links a{
    text-decoration:none;
    font-weight:500;
    color:#0d6efd;
}

.nav-links a:hover{
    opacity:0.7;
}

/* center login */

.login-container{
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    width:420px;
    padding:40px;
    background:white;
    border-radius:12px;
    box-shadow:0 10px 35px rgba(0,0,0,0.1);
}

.login-title{
    text-align:center;
    margin-bottom:30px;
}

.btn-login{
    width:100%;
    background:linear-gradient(90deg,#4e6ef2,#5a7cff);
    border:none;
}

/* eye button */

.password-wrapper{
    position:relative;
}

.eye-btn{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:18px;
    color:#555;
}

</style>

</head>

<body>

<!-- Top Branding -->
<div class="topbar">

<div class="brand">
TriCloud Vault
</div>

<div class="nav-links">

<a href="https://tricloudvault.charansai.me/auth/login.html">
User Login
</a>

<a href="https://tricloudvault.charansai.me/auth/register.html">
User Register
</a>

</div>

</div>


<div class="login-container">

<div class="login-card">

<div class="login-title">
<h3>Admin Login</h3>
</div>

<form method="post">
{% csrf_token %}

<div class="mb-3">
<label>Email <span style="color:red">*</span></label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="mb-3">
<label>Password <span style="color:red">*</span></label>

<div class="password-wrapper">
<input type="password" id="password" name="password" class="form-control" required>
<span class="eye-btn" onclick="togglePassword()">👁</span>
</div>

</div>

<br>

<button class="btn btn-primary btn-login">
Login
</button>

</form>

</div>

</div>

<script>

function togglePassword() {
    const password = document.getElementById("password");

    if(password.type === "password"){
        password.type = "text";
    }else{
        password.type = "password";
    }
}

</script>

</body>
</html>
